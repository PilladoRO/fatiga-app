<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Encuesta Fatiga y Somnolencia</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#5DBB63">

<style>
body{
    margin:0;
    font-family:Arial;
    background:#F4F6F8;
}

/* SPLASH */
#splash{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#5DBB63;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.splash-logo{
    width:180px;
    margin-bottom:20px;
}

.splash-text{
    color:white;
    font-size:18px;
    font-weight:bold;
    text-align:center;
}

/* HEADER */
.header{
    background: linear-gradient(90deg, #5DBB63, #F28C28);
    color:white;
    padding:15px;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.logo{
    display:block;
    margin:10px auto;
    max-width:180px;
}

.container{
    max-width:500px;
    margin:auto;
    padding:15px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
}

input[type="text"], select{
    width:100%;
    padding:10px;
    font-size:16px;
    border-radius:8px;
    border:1px solid #ccc;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:15px;
    background: linear-gradient(90deg, #5DBB63, #F28C28);
    color:white;
    border:none;
    font-size:18px;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
}

.resultado{
    text-align:center;
    font-size:30px;
    font-weight:bold;
    margin-top:15px;
}

.apto{ color:#5DBB63; }
.noapto{ color:#F28C28; }

#estado{
    text-align:center;
    font-weight:bold;
    margin:10px 0;
}

.historial-item{
    border:1px solid #ddd;
    padding:10px;
    margin-bottom:10px;
    border-radius:8px;
    background:#fafafa;
}

footer{
    text-align:center;
    padding:20px;
    color:#777;
    font-size:13px;
}
</style>
</head>

<body>

<!-- SPLASH -->
<div id="splash">
    <img src="icon.png" class="splash-logo">
    <div class="splash-text">Aplicación creada por Jorge Alfaro B.</div>
</div>

<img src="icon.png" class="logo">

<div class="header">
Encuesta de Fatiga y Somnolencia
</div>

<div class="container">

<div id="estado"></div>

<div class="card">
<label>Nombre del conductor</label>
<input type="text" id="nombre" required>

<br><br>

<label>Faena</label>
<select id="faena" required>
    <option value="">Seleccione Faena</option>
    <option value="Faena El Romeral">Faena El Romeral</option>
    <option value="Faena Franke">Faena Franke</option>
</select>
</div>

<form id="formulario">
<div class="card">

<!-- PREGUNTAS -->
<script>
const preguntas = [
"¿Durmió más de 5 horas?",
"¿Cuerpo adormecido?",
"¿Bostezos frecuentes?",
"¿Dificultad concentración?",
"¿Pesadez ojos?",
"¿Menos sueño habitual?",
"¿Cansancio físico?",
"¿Sueño actual?",
"¿Microsueños?",
"¿Apto conducir?"
];

document.write(
preguntas.map((p,i)=>`
<div>
${i+1}. ${p}<br>
<input type="radio" name="p${i+1}" value="Si" required> Sí
<input type="radio" name="p${i+1}" value="No"> No
</div><br>
`).join("")
);
</script>

<button type="submit">ENVIAR</button>
</div>

<div id="resultado" class="resultado"></div>
</form>

<div class="card">
<button type="button" onclick="mostrarHistorial()">
VER ENCUESTAS REALIZADAS
</button>

<div id="historial" style="margin-top:15px;"></div>
</div>

</div>

<footer>
© 2026 Todos los derechos reservados | Jorge Alfaro B.
</footer>

<script>
const scriptURL = "TU_URL_DE_GOOGLE_SCRIPT";

/* ================= SW REGISTRATION ================= */
if ("serviceWorker" in navigator) {
  window.addEventListener("load", () => {
    navigator.serviceWorker.register("./sw.js")
      .then(() => console.log("SW activo"))
      .catch(err => console.log("SW error:", err));
  });
}

/* SPLASH */
window.addEventListener("load", ()=>{
  setTimeout(()=>{
    document.getElementById("splash").style.display = "none";
  }, 2500);
});

/* OFFLINE STORAGE */
function guardarOffline(data){
  let lista = JSON.parse(localStorage.getItem("encuestas")) || [];
  lista.push(data);
  localStorage.setItem("encuestas", JSON.stringify(lista));
}

function guardarHistorial(data){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];
  historial.unshift(data);
  localStorage.setItem("historial", JSON.stringify(historial));
}

function mostrarHistorial(){
  let historial = JSON.parse(localStorage.getItem("historial")) || [];

  document.getElementById("historial").innerHTML =
    historial.length === 0
    ? "No hay encuestas registradas"
    : historial.map(item=>`
      <div class="historial-item">
        <b>${item.nombre}</b><br>
        ${item.faena}<br>
        ${item.fecha} ${item.hora}<br><br>
        <span style="color:${item.resultado==="APTO"?"#5DBB63":"#F28C28"};font-weight:bold;">
        ${item.resultado}
        </span>
      </div>
    `).join("");
}

/* ENVIO PENDIENTES */
async function enviarPendientes(){
  let lista = JSON.parse(localStorage.getItem("encuestas")) || [];
  if(lista.length === 0) return;

  for(let item of lista){
    try{
      await fetch(scriptURL,{
        method:"POST",
        body: JSON.stringify(item)
      });
    }catch(e){
      console.log("Error envio pendiente");
      return;
    }
  }

  localStorage.removeItem("encuestas");
}

/* ESTADO */
function actualizarEstado(){
  document.getElementById("estado").innerText =
    navigator.onLine ? "🟢 En línea" : "🔴 Sin conexión";
}
setInterval(actualizarEstado,1000);

window.addEventListener("online", enviarPendientes);

/* FORM */
document.getElementById("formulario").addEventListener("submit", async (e)=>{
e.preventDefault();

let nombre = document.getElementById("nombre").value;
let faena = document.getElementById("faena").value;

let count = 0;
let respuestas = {};

for(let i=1;i<=10;i++){
  let v = document.querySelector(`input[name=p${i}]:checked`).value;
  respuestas["p"+i] = v;
  if(v==="Si") count++;
}

let resultado = count>=7 ? "APTO" : "NO APTO";

document.getElementById("resultado").innerHTML =
resultado==="APTO"
? `<span class="apto">APTO</span>`
: `<span class="noapto">NO APTO</span>`;

let data = {
  nombre,
  faena,
  fecha:new Date().toLocaleDateString(),
  hora:new Date().toLocaleTimeString(),
  ...respuestas,
  resultado
};

guardarHistorial(data);

if(navigator.onLine){
  await fetch(scriptURL,{
    method:"POST",
    body: JSON.stringify(data)
  });
}else{
  guardarOffline(data);
  alert("Sin conexión: guardado localmente");
}

alert("Encuesta procesada");
document.getElementById("formulario").reset();
});
</script>

</body>
</html>
